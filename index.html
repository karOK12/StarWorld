<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alpha Mining Card</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
body{
  margin:0;
  background:#0b1020;
  font-family:Arial;
  color:white;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding-top:10px;
}

.card{
  width:100%;
max-width:900px;
  padding:16px;
  border-radius:22px;
  background:rgba(255,255,255,0.04);
  box-shadow:0 0 40px rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  position:relative;
}

.top-icons{
  display:flex;
  justify-content:flex-end;
  margin-bottom:6px;
  transform: translateY(-6px) translateX(4px);
}

.top-icons i{
  width:55px;
  height:55px;
  border-radius:16px;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  color:white;
  box-shadow:0 14px 35px rgba(0,114,255,.5);
  cursor:pointer;
}

.row{
  display:flex;
  justify-content:flex-start;
  align-items:center;
  gap:10px;
}

.circle{
  width:155px;
  height:155px;
  border-radius:50%;
  background: radial-gradient(circle,#1b2233,#0b0f1a);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 25px #7c3aed55;
  position:relative;
  flex-shrink:0;
}

.right{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:6px;
  text-align:right;
}

.progress-ring{
  position:absolute;
  top:0;
  left:0;
  transform:rotate(-90deg);
}

.progress-bg{
  fill:none;
  stroke:rgba(255,255,255,0.08);
  stroke-width:6;
}

.progress-bar{
  fill:none;
  stroke:#7c3aed;
  stroke-width:6;
  stroke-linecap:round;
}

.timer{
  font-size:22px;
  font-weight:bold;
}

.sub{
  font-size:11px;
  opacity:0.6;
}

.balance{
  font-size:24px;
  font-weight:bold;
}

.rate{
  font-size:13px;
  color:#a78bfa;
}

.adBtn{
  width:100%;
  padding:10px;
  border-radius:10px;
  background:#111827;
  color:white;
  border:1px solid rgba(255,255,255,0.1);
  cursor:pointer;
}

button{
  width:100%;
  margin-top:18px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#7c3aed,#f97316);
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

  <div class="top-icons">
    <i class="fa-solid fa-wallet"></i>
  </div>

  <div class="row">

    <div class="circle">
      <svg class="progress-ring" width="155" height="155">
        <circle class="progress-bg" cx="77" cy="77" r="70"></circle>
        <circle class="progress-bar" cx="77" cy="77" r="70"></circle>
      </svg>

      <div class="timer" id="timer">00:00:00</div>
      <div class="sub">MINING TIMER</div>
    </div>

    <div class="right">
      <div class="balance" id="balance">000.000000</div>
      <div class="rate" id="rate">↗️ +0.00/h</div>

      <button class="adBtn" onclick="openAd()">
        WATCH AD
      </button>
    </div>

  </div>

  <button id="startBtn" onclick="startMining()">START MINING</button>

</div>

<script>
let started = false;
let coins = 0;
let ratePerSec = 0.01;
let startTime = 0;

let userEmail = localStorage.getItem("email") || "guest";

const circle = document.querySelector(".progress-bar");
const radius = 70;
const circumference = 2 * Math.PI * radius;

circle.style.strokeDasharray = circumference;
circle.style.strokeDashoffset = circumference;

// ▶️ تشغيل التعدين
function startMining(){
  if(started) return;

  started = true;
  startTime = Date.now();

  document.getElementById("startBtn").innerText = "MINING ACTIVE";
  document.getElementById("startBtn").disabled = true;

  mine(); // أول تشغيل
}

// 💰 طلب التعدين من السيرفر
function mine(){
  if(!started) return;

  fetch("/mine", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      email: userEmail,
      seconds: 1
    })
  })
  .then(res => res.json())
  .then(data => {
    if(data.balance !== undefined){
      coins = data.balance;
    }
  })
  .catch(err => console.log("Mine error:", err));
}

// 🎬 إعلان
function openAd(){
  window.open("https://example.com", "_blank");
}

// ⏱️ وقت
function formatTime(sec){
  let h = String(Math.floor(sec/3600)).padStart(2,'0');
  let m = String(Math.floor(sec/60)%60).padStart(2,'0');
  let s = String(Math.floor(sec%60)).padStart(2,'0');
  return `${h}:${m}:${s}`;
}

// 🔁 loop الرئيسي
setInterval(() => {

  let elapsed = started ? (Date.now() - startTime)/1000 : 0;

  if(started){
    mine(); // تشغيل التعدين الحقيقي
  }

  document.getElementById("timer").innerText = formatTime(elapsed);
  document.getElementById("balance").innerText = coins.toFixed(6);
  document.getElementById("rate").innerText =
    `↗️ +${(ratePerSec*3600).toFixed(2)}/h`;

  circle.style.strokeDashoffset =
    circumference - Math.min(elapsed / 600, 1) * circumference;

}, 1000);

// 💼 فتح المحفظة
document.addEventListener("DOMContentLoaded", () => {
  const walletIcon = document.querySelector(".top-icons i");

  walletIcon.addEventListener("click", () => {
    window.open("wallet.html", "_blank", "width=420,height=720");
  });
});
</script>

</body>
</html>
