<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alpha Mining Card</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
body{
  margin:0;
  background:#0b1020;
  font-family:Arial;
  color:white;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding-top:10px;
}

.card{
  width:100%;
max-width:900px;
  padding:16px;
  border-radius:22px;
  background:rgba(255,255,255,0.04);
  box-shadow:0 0 40px rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  position:relative;
}

.top-icons{
  display:flex;
  justify-content:flex-end;
  margin-bottom:6px;
  transform: translateY(-6px) translateX(4px);
}

.top-icons i{
  width:55px;
  height:55px;
  border-radius:16px;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  color:white;
  box-shadow:0 14px 35px rgba(0,114,255,.5);
  cursor:pointer;
}

.row{
  display:flex;
  justify-content:flex-start;
  align-items:center;
  gap:10px;
}

.circle{
  width:155px;
  height:155px;
  border-radius:50%;
  background: radial-gradient(circle,#1b2233,#0b0f1a);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 25px #7c3aed55;
  position:relative;
  flex-shrink:0;
}

.right{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:4px;
  text-align:right;
}

.progress-ring{
  position:absolute;
  top:0;
  left:0;
  transform:rotate(-90deg);
}

.progress-bg{
  fill:none;
  stroke:rgba(255,255,255,0.08);
  stroke-width:6;
}

.progress-bar{
  fill:none;
  stroke:#7c3aed;
  stroke-width:6;
  stroke-linecap:round;
}

.timer{
  font-size:22px;
  font-weight:bold;
  font-variant-numeric: tabular-nums;
  color: #7c3aed;
}

.sub{
  font-size:11px;
  opacity:0.6;
}

.balance-container {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
}

.balance-label {
  font-size: 10px;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 1px;
  opacity: 0.5;
}

.balance {
  font-size: 26px;
  font-weight: bold;
  min-width: 140px;
  text-align: right;
  font-variant-numeric: tabular-nums;
  color: #a78bfa;
  opacity: 1;
  transition: none;
}

.power-container {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
}

.power-label {
  font-size: 10px;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 1px;
  opacity: 0.5;
}

.power {
  font-size: 16px;
  color: #4ade80;
  min-width: 100px;
  text-align: right;
  font-variant-numeric: tabular-nums;
  opacity: 0.8;
}

.rate-container {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
}

.rate-label {
  font-size: 10px;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 1px;
  opacity: 0.5;
}

.rate {
  font-size: 14px;
  color: #fbbf24;
  min-width: 90px;
  text-align: right;
  font-variant-numeric: tabular-nums;
  font-weight: bold;
}

.profit-info {
  font-size: 11px;
  color: #6b7280;
  text-align: right;
  opacity: 0.5;
  margin-top: -2px;
}

.adBtn{
  width:100%;
  padding:10px;
  border-radius:10px;
  background:#111827;
  color:white;
  border:1px solid rgba(255,255,255,0.1);
  cursor:pointer;
  margin-top: 4px;
}

button{
  width:100%;
  margin-top:18px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#7c3aed,#f97316);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.balance-update {
  animation: pulse 0.3s ease;
}

@keyframes pulse {
  0% { transform: scale(1); color: #7c3aed; }
  50% { transform: scale(1.05); color: #c4b5fd; }
  100% { transform: scale(1); color: #a78bfa; }
}

.timer-update {
  animation: timerPulse 0.3s ease;
}

@keyframes timerPulse {
  0% { opacity: 0.7; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.02); }
  100% { opacity: 0.7; transform: scale(1); }
}
</style>
</head>

<body>

<div class="card">

  <div class="top-icons">
    <i class="fa-solid fa-wallet"></i>
  </div>

  <div class="row">

    <div class="circle">
      <svg class="progress-ring" width="155" height="155">
        <circle class="progress-bg" cx="77" cy="77" r="70"></circle>
        <circle class="progress-bar" cx="77" cy="77" r="70"></circle>
      </svg>

      <div class="timer" id="timer">00:00:00</div>
      <div class="sub">MINING TIMER</div>
    </div>

    <div class="right">

      <div class="balance-container">
        <div class="balance-label">💰 الرصيد</div>
        <div class="balance" id="balance">0.000000</div>
      </div>

      <div class="power-container">
        <div class="power-label">⚡ القوة</div>
        <div class="power" id="power">0.00</div>
      </div>

      <div class="rate-container">
        <div class="rate-label">📈 معدل التعدين</div>
        <div class="rate" id="rate">↗️ +0.00/h</div>
      </div>

      <div class="profit-info" id="profitInfo">⏱️ +0.000000 per second</div>

      <button class="adBtn" onclick="openAd()">
        📺 WATCH AD
      </button>
    </div>

  </div>

  <button id="startBtn" onclick="startMining()">⛏️ START MINING</button>

</div>

<script>
// ============================================================
// 🆓 Alpha Mining Card - Production Ready
// ============================================================
// 📌 قاعدة البيانات تحتوي فقط على: balance, power, email
// 💰 balance = رصيد المستخدم
// ⚡ power = قوة التعدين (تحدد معدل التعدين)
// 🔄 لا توجد أي قيم ثابتة أو محاكاة
// ============================================================

// ==================== API BASE ====================
const API = "https://your-project.vercel.app";

// ==================== STATE ====================
let isMining = false;
let balance = 0.000000;
let power = 0;
let RATE_PER_HOUR = 0;
let profitPerSecond = 0;

// ⏱️ مدة التعدين (8 ساعات)
const miningDuration = 28800;
const SMOOTHING_FACTOR = 0.005;

let startTime = 0;
let elapsedTime = 0;
let timerInterval = null;
let lastSecond = -1;

// ==================== DOM REFERENCES ====================
const circle = document.querySelector(".progress-bar");
const radius = 70;
const circumference = 2 * Math.PI * radius;

circle.style.strokeDasharray = circumference;
circle.style.strokeDashoffset = circumference;

const balanceEl = document.getElementById("balance");
const powerEl = document.getElementById("power");
const rateEl = document.getElementById("rate");
const timerEl = document.getElementById("timer");
const profitInfoEl = document.getElementById("profitInfo");

// عرض القوة (0)
powerEl.textContent = `0.00`;
rateEl.textContent = `↗️ +0.00/h`;
profitInfoEl.textContent = `⏱️ +0.000000 per second`;

console.log("========== 📊 معلومات النظام ==========");
console.log(`💰 الرصيد: يتم جلبه من قاعدة البيانات`);
console.log(`⚡ القوة: يتم جلبها من قاعدة البيانات`);
console.log(`📈 معدل التعدين = القوة × 0.5`);
console.log("=======================================");

// ==================== UPDATE MINING RATE FROM POWER ====================
function updateMiningRateFromPower(newPower){
    power = newPower;
    RATE_PER_HOUR = power * 0.5;
    profitPerSecond = RATE_PER_HOUR / 3600;
    
    powerEl.textContent = power.toFixed(2);
    rateEl.textContent = `↗️ +${RATE_PER_HOUR.toFixed(2)}/h`;
    profitInfoEl.textContent = `⏱️ +${profitPerSecond.toFixed(6)} per second`;
    
    console.log(`⚡ تم تحديث القوة: ${power}`);
    console.log(`📊 معدل التعدين: ${RATE_PER_HOUR}/h`);
}

// ==================== START MINING ====================
function startMining(){
  if(isMining) return;

  isMining = true;
  startTime = Date.now();
  elapsedTime = 0;
  lastSecond = -1;

  document.getElementById("startBtn").innerText = "⛏️ MINING...";
  document.getElementById("startBtn").disabled = true;

  circle.style.strokeDashoffset = circumference;

  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 1000);
  
  updateTimer();
  
  console.log("⛏️ بدأ التعدين!");
  console.log(`📊 معدل التعدين الحالي: ${RATE_PER_HOUR}/h`);
}

// ==================== UPDATE TIMER ====================
function updateTimer(){
  if(!isMining) return;

  const now = Date.now();
  elapsedTime = (now - startTime) / 1000;

  const target = elapsedTime * profitPerSecond;
  balance += (target - balance) * SMOOTHING_FACTOR;

  updateBalanceDisplay(balance);

  const currentSecond = Math.floor(elapsedTime);
  if(currentSecond !== lastSecond){
    lastSecond = currentSecond;
    timerEl.textContent = formatTime(elapsedTime);
    
    timerEl.classList.remove('timer-update');
    requestAnimationFrame(() => {
      timerEl.classList.add('timer-update');
    });
    
    console.log(`⏱️ ${formatTime(elapsedTime)} | 💰 ${balance.toFixed(6)}`);
  }

  const progress = Math.min(elapsedTime / miningDuration, 1);
  circle.style.strokeDashoffset = circumference - (progress * circumference);

  if(elapsedTime >= miningDuration){
    finishMining();
  }
}

// ==================== FINISH MINING ====================
function finishMining(){
  if(!isMining) return;

  isMining = false;
  
  if(timerInterval){
    clearInterval(timerInterval);
    timerInterval = null;
  }

  timerEl.textContent = "✅ COMPLETE!";
  
  document.getElementById("startBtn").innerText = "⛏️ MINE AGAIN";
  document.getElementById("startBtn").disabled = false;

  saveData();

  console.log("========== ✅ انتهى التعدين ==========");
  console.log(`💰 الرصيد النهائي: ${balance.toFixed(6)}`);
  console.log("=====================================");
}

// ==================== UPDATE BALANCE DISPLAY ====================
function updateBalanceDisplay(value){
  balanceEl.classList.remove('balance-update');
  requestAnimationFrame(() => {
    balanceEl.classList.add('balance-update');
  });
  
  balanceEl.textContent = value.toFixed(6);
}

// ==================== SAVE DATA ====================
function saveData(){
  const email = localStorage.getItem("email") || "guest";

  fetch(API + "/user/save", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: email,
      balance: balance,
      power: power
    })
  })
  .then(res => res.json())
  .then(data => {
    console.log("✅ تم حفظ البيانات:", data);
  })
  .catch(err => {
    console.log("❌ خطأ في الحفظ:", err);
  });
}

// ==================== FETCH DATA ====================
function fetchUserData(){
  const email = localStorage.getItem("email") || "guest";

  console.log("📡 جاري جلب البيانات من قاعدة البيانات...");

  fetch(API + "/user", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email: email })
  })
  .then(res => {
    if(!res.ok) throw new Error("HTTP Error");
    return res.json();
  })
  .then(data => {
    console.log("✅ تم استلام البيانات:", data);

    if(typeof data.balance === "number"){
      balance = data.balance;
      balanceEl.textContent = balance.toFixed(6);
    }

    if(typeof data.power === "number"){
      updateMiningRateFromPower(data.power);
    }
  })
  .catch(err => {
    console.log("❌ خطأ في جلب البيانات:", err);
  });
}

// ==================== FORMAT TIME ====================
function formatTime(sec){
  let h = String(Math.floor(sec / 3600)).padStart(2,'0');
  let m = String(Math.floor((sec % 3600) / 60)).padStart(2,'0');
  let s = String(Math.floor(sec % 60)).padStart(2,'0');
  return `${h}:${m}:${s}`;
}

// ==================== OPEN AD ====================
function openAd(){
  window.open("https://example.com", "_blank");
}

// ==================== WALLET ====================
document.addEventListener("DOMContentLoaded", () => {
  const walletIcon = document.querySelector(".top-icons i");
  if(walletIcon){
    walletIcon.addEventListener("click", () => {
      window.open("wallet.html", "_blank", "width=420,height=720");
    });
  }
  
  fetchUserData();
});

console.log("✅ النظام جاهز!");
console.log("📊 يعتمد على: balance (الرصيد) و power (القوة)");
console.log("🔗 متصل بـ GitHub + Vercel + Neon Database");
console.log("⚡ معدل التعدين = power × 0.5");
</script>

</body>
</html>
